[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "factorlab-backtesting"
version = "0.1.0"
description = "Event-driven backtesting engine: strategies, rebalancing, execution, costs, walk-forward."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "FactorLab AI" }]
keywords = ["quant", "finance", "backtesting", "walk-forward", "transaction-costs"]
classifiers = [
    "Intended Audience :: Financial and Insurance Industry",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]

# Numerics + the approved portfolio analytics (ReturnSeries / PerformanceReport).
# factorlab-optimizer is an optional peer used by OptimizerStrategy (lazy import).
dependencies = ["numpy>=1.26", "factorlab-portfolio>=0.1"]

[project.optional-dependencies]
optimizer = ["factorlab-optimizer>=0.1"]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "hypothesis>=6.100",
    "mypy>=1.10",
    "ruff>=0.5",
]

[tool.hatch.build.targets.wheel]
packages = ["src/factorlab_backtesting"]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = "-ra --strict-markers --strict-config"
markers = [
    "property: property-based invariants (Hypothesis)",
    "integration: cross-package integration",
]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unreachable = true
disallow_any_generics = true

[[tool.mypy.overrides]]
module = ["factorlab_portfolio.*", "factorlab_optimizer.*"]
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "C4", "SIM", "RUF"]
ignore = ["N803", "N806", "N812", "RUF001", "RUF002", "RUF003"]

[tool.coverage.run]
source = ["factorlab_backtesting"]
branch = true
