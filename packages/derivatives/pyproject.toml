[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "factorlab-derivatives"
version = "0.1.0"
description = "Institutional derivatives engine: option pricing, Greeks, implied/realized volatility, Monte Carlo."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "FactorLab AI" }]
keywords = ["quant", "finance", "derivatives", "options", "black-scholes", "greeks", "volatility"]
classifiers = [
    "Intended Audience :: Financial and Insurance Industry",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

# Pure numerics.  No web, no DB, no I/O.
dependencies = ["numpy>=1.26", "scipy>=1.11"]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "hypothesis>=6.100",
    "mypy>=1.10",
    "ruff>=0.5",
]

[tool.hatch.build.targets.wheel]
packages = ["src/factorlab_derivatives"]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = "-ra --strict-markers --strict-config"
markers = [
    "property: property-based invariants (Hypothesis)",
]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unreachable = true
disallow_any_generics = true

[[tool.mypy.overrides]]
module = ["scipy.*"]
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "C4", "SIM", "RUF"]
ignore = ["N803", "N806", "N812", "RUF001", "RUF002", "RUF003"]

[tool.coverage.run]
source = ["factorlab_derivatives"]
branch = true
