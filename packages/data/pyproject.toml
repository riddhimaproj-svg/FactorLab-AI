[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "factorlab-data"
version = "0.1.0"
description = "Reusable institutional factor-data infrastructure: adapters, panels, validation, alignment, caching."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "FactorLab AI" }]
keywords = ["quant", "finance", "factor-data", "fama-french", "kenneth-french"]
classifiers = [
    "Intended Audience :: Financial and Insurance Industry",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]

# The data layer depends only on NumPy for numerics.  It produces
# ``factorlab_quant`` FactorSets on demand (``FactorPanel.to_factor_set``) via a
# lazy import, so the quant engine is an *optional* peer dependency, keeping the
# hard dependency surface minimal and install-order independent.
dependencies = ["numpy>=1.26"]

[project.optional-dependencies]
quant = ["factorlab-quant>=0.2"]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "hypothesis>=6.100",
    "mypy>=1.10",
    "ruff>=0.5",
]

[tool.hatch.build.targets.wheel]
packages = ["src/factorlab_data"]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = "-ra --strict-markers --strict-config"
markers = [
    "property: property-based invariants (Hypothesis)",
    "integration: cross-package integration (data -> quant models)",
]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unreachable = true
disallow_any_generics = true

[[tool.mypy.overrides]]
module = ["factorlab_quant.*"]
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "C4", "SIM", "RUF"]
ignore = ["N803", "N806"]

[tool.coverage.run]
source = ["factorlab_data"]
branch = true
